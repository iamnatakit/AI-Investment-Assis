version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: investment_chatbot
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d investment_chatbot"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend_baseline:
    build: 
      context: .
      dockerfile: Dockerfile.backend
    command: uvicorn project_1_investment_ai_agent.app.main:app --host 0.0.0.0 --port 8801
    ports:
      - "8801:8801"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://user:password@db:5432/investment_chatbot
    depends_on:
      db:
        condition: service_healthy

  backend_intent:
    build: 
      context: .
      dockerfile: Dockerfile.backend
    command: uvicorn project_2_investment_ai_agent_intent.app.main:app --host 0.0.0.0 --port 8802
    ports:
      - "8802:8802"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://user:password@db:5432/investment_chatbot
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend_react
      dockerfile: Dockerfile
    ports:
      - "3300:3300"
    environment:
      - VITE_API_BASELINE_URL=http://backend_baseline:8801
      - VITE_API_INTENT_URL=http://backend_intent:8802
    depends_on:
      - backend_baseline
      - backend_intent

volumes:
  postgres_data:
